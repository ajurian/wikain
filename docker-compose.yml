# Dev: the language service the web app depends on. `docker compose up -d nlp`, then `npm run dev`.
#
# The web app is NOT in here — it runs on Vite (`npm run dev`) and reaches this container on
# NLP_SERVICE_URL=http://localhost:8000.
services:
  pgadmin:
    image: dpage/pgadmin4:9.16
    restart: on-failure
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:18.4
    restart: on-failure
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wikain
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wikain"]
      interval: 10s
      timeout: 5s
      retries: 3

  nlp:
    build: ./python
    restart: on-failure
    env_file:
      - .env.development
    ports:
      - "8000:8000"
    command: uvicorn wikain.service.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    develop:
      watch:
        - action: sync
          path: ./python/src
          target: /app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      # spaCy loads at startup; give it room before the container is called unhealthy.
      start_period: 40s
      retries: 3

volumes:
  db_data: